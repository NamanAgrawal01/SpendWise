name: spendwise
description: Smart Expense Tracker App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  fl_chart: ^1.2.0
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  pdf: ^3.12.0
  printing: ^5.14.3
  local_auth: ^3.0.1
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.2

  flutter_sms_inbox: ^1.0.3
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon.jpeg
    - assets/logo.jpeg